name: Continuous Integration

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      #checkov:skip=CKV_GHA_7:The Action nature has to do with getting values from inputs in workflow_dispatch
      api:
        type: boolean
        default: true
      worker1:
        type: boolean
        default: true
      worker2:
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  test-javascript:
    name: JavaScript Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Dependencies
        id: npm-ci
        run: npm ci

      - name: Check Format
        id: npm-format-check
        run: npm run format:check

      - name: Lint
        id: npm-lint
        run: npm run lint

      # - name: Test
      #   id: npm-ci-test
      #   run: npm run ci-test

  get-selected:
    name: GitHub Actions Test
    runs-on: ubuntu-latest
    outputs:
      selected: ${{ steps.get-selected-step.outputs.selected}}
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Test Local Action
        id: get-selected-step
        uses: ./
        with:
          format: 'json'

  consumer:
    runs-on: ubuntu-latest
    name: Consume Output
    needs: get-selected
    steps:
      - name: Print
        run: echo "${NEEDS_GET_SELECTED_OUTPUTS_SELECTED}"
        env:
          NEEDS_GET_SELECTED_OUTPUTS_SELECTED:
            ${{ needs.get-selected.outputs.selected }}
